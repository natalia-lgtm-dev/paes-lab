<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PAES Lab — Mi Progreso</title>
<meta name="theme-color" content="#05161A">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#05161A;--bg-card:#0F2B33;--bg-elevated:#143A45;--border:#1A4050;--neon:#00FFD1;--neon-dim:#00FFD140;--neon-glow:#00FFD120;--coral:#FF6B6B;--coral-dim:#FF6B6B30;--teal:#4ECDC4;--teal-dim:#4ECDC430;--yellow:#FFE66D;--yellow-dim:#FFE66D30;--text:#B8FFF5;--text-muted:#6BA8A0;--text-dim:#3D6B63;--white:#E8FFFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;padding:20px;padding-bottom:60px}
.container{max-width:600px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:20px;font-weight:600;color:var(--white)}
.back-link{font-size:13px;color:var(--text-muted);text-decoration:none}.back-link:hover{color:var(--neon)}
.section-title{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin:20px 0 12px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--neon)}.stat-val.coral{color:var(--coral)}.stat-val.teal{color:var(--teal)}.stat-val.yellow{color:var(--yellow)}
.stat-lbl{font-size:10px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.card-title{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* Radar chart via CSS */
.radar-container{position:relative;width:250px;height:250px;margin:0 auto 16px}
.radar-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.radar-ring{position:absolute;border:1px solid var(--border);border-radius:50%}
.radar-label{position:absolute;font-size:11px;color:var(--text-muted);white-space:nowrap}

/* Simple bar chart */
.chart-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-bar:last-child{margin-bottom:0}
.chart-bar-label{font-size:12px;color:var(--text-muted);width:60px;text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;height:20px;background:var(--bg-deep);border-radius:4px;overflow:hidden;position:relative}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;min-width:30px}

.eje-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.eje-row:last-child{margin-bottom:0}
.eje-name{font-size:13px;color:var(--text);width:90px;flex-shrink:0}
.eje-bar{flex:1;height:8px;background:var(--bg-deep);border-radius:4px;overflow:hidden}
.eje-bar-fill{height:100%;border-radius:4px}
.eje-pct{font-family:'Space Mono',monospace;font-size:12px;width:40px;text-align:right;flex-shrink:0}

.level-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.level-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.level-name{font-size:16px;font-weight:600;color:var(--teal)}
.level-xp{font-family:'Space Mono',monospace;font-size:13px;color:var(--text-muted)}
.xp-bar{height:10px;background:var(--bg-deep);border-radius:5px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--neon),var(--teal));border-radius:5px;transition:width 0.5s ease}

.logro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.logro{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.logro.unlocked{border-color:var(--neon);background:var(--neon-glow)}
.logro-icon{font-size:24px;margin-bottom:4px}
.logro-name{font-size:11px;color:var(--text);font-weight:500}
.logro-date{font-size:10px;color:var(--text-dim);margin-top:2px}
.logro.locked{opacity:0.3}

.empty{text-align:center;padding:20px;color:var(--text-dim);font-size:14px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Mi Progreso</h1>
    <a class="back-link" href="index.html">← Dashboard</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="s-days">0</div><div class="stat-lbl">Días PAES</div></div>
    <div class="stat-card"><div class="stat-val teal" id="s-sesiones">0</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-card"><div class="stat-val yellow" id="s-streak">0</div><div class="stat-lbl">Racha</div></div>
  </div>

  <div class="level-card">
    <div class="level-header"><div class="level-name" id="level-name">Novato</div><div class="level-xp" id="level-xp">0 / 100 XP</div></div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>

  <div class="section-title">Aciertos por eje (todas las sesiones)</div>
  <div class="card" id="eje-card"><div class="empty">Cargando...</div></div>

  <div class="section-title">Evolución semanal</div>
  <div class="card" id="evolution-card"><div class="empty">Cargando...</div></div>

  <div class="section-title">Logros</div>
  <div class="card"><div class="logro-grid" id="logros-grid"></div></div>

  <div class="section-title">Historial de sesiones</div>
  <div class="card" id="history-card"><div class="empty">Cargando...</div></div>
</div>

<script>
const SUPABASE_URL='https://cjpmainjspaygmrnnckk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqcG1haW5qc3BheWdtcm5uY2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjgwNjEsImV4cCI6MjA5MzE0NDA2MX0.4Cbb9nL_l9yoAEDS-1Otk4hYoxlbpHCY7Y51DITv1Sc';
const SB_H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
async function sbGet(t,q=''){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?${q}`,{headers:SB_H});return r.ok?await r.json():[]}

const LEVELS=[{name:'Novato',min:0,max:100},{name:'Aprendiz',min:100,max:300},{name:'Competente',min:300,max:700},{name:'Avanzado',min:700,max:1500},{name:'Elite',min:1500,max:3000},{name:'PAES Ready',min:3000,max:99999}];
function getLevel(xp){for(let i=LEVELS.length-1;i>=0;i--)if(xp>=LEVELS[i].min)return LEVELS[i];return LEVELS[0]}

const PAES_DATE=new Date(2026,10,30);
const LOGROS_DEF=[
  {tipo:'primera_sesion',icon:'⚡',name:'Primera sesión',desc:'Completar tu primera sesión'},
  {tipo:'racha_3',icon:'🔥',name:'Racha de 3',desc:'3 días consecutivos'},
  {tipo:'racha_7',icon:'🔥',name:'Racha de 7',desc:'7 días consecutivos'},
  {tipo:'racha_30',icon:'🏆',name:'Racha de 30',desc:'30 días consecutivos'},
  {tipo:'sesiones_10',icon:'📊',name:'10 sesiones',desc:'Completar 10 sesiones'},
  {tipo:'sesiones_50',icon:'💎',name:'50 sesiones',desc:'Completar 50 sesiones'},
  {tipo:'pct_90',icon:'🎯',name:'Puntería 90%',desc:'90%+ aciertos en un simulacro'},
  {tipo:'velocidad',icon:'⏱️',name:'Velocista',desc:'Promedio < 15s por pregunta'},
];

async function loadProgress(){
  const user=JSON.parse(localStorage.getItem('paes_lab_user')||'{}');
  if(!user.id){window.location.href='index.html';return}

  document.getElementById('s-days').textContent=Math.max(0,Math.ceil((PAES_DATE-new Date())/(86400000)));

  const sesiones=await sbGet('sesiones',`usuario_id=eq.${user.id}&completada=eq.true&order=created_at.desc`);
  document.getElementById('s-sesiones').textContent=sesiones.length;

  // XP
  let totalXP=0;
  sesiones.forEach(s=>totalXP+=10+(s.aciertos||0)*2);
  const level=getLevel(totalXP);
  document.getElementById('level-name').textContent=level.name;
  document.getElementById('level-xp').textContent=`${totalXP} / ${level.max} XP`;
  document.getElementById('xp-fill').style.width=Math.min(100,((totalXP-level.min)/(level.max-level.min))*100)+'%';

  // Racha
  const fechas=new Set();
  sesiones.forEach(s=>fechas.add(s.fecha||s.created_at.split('T')[0]));
  let streak=0,check=new Date();
  if(!fechas.has(check.toISOString().split('T')[0]))check.setDate(check.getDate()-1);
  while(fechas.has(check.toISOString().split('T')[0])){streak++;check.setDate(check.getDate()-1)}
  document.getElementById('s-streak').textContent=streak;

  // Ejes
  const respuestas=await sbGet('respuestas',`usuario_id=eq.${user.id}&order=created_at.desc&limit=500`);
  const ejes={};
  const ejeC={numeros:'var(--teal)',algebra:'var(--yellow)',geometria:'var(--coral)',prob_estadistica:'#B8A5FF',fracciones:'var(--teal)',porcentajes:'var(--yellow)',potencias:'var(--coral)',factorizacion:'#B8A5FF',calculo:'var(--neon)',algebra_av:'var(--yellow)',funciones:'var(--teal)',geometria_3d:'var(--coral)',prob_avanzada:'#B8A5FF'};
  const ejeN={numeros:'Números',algebra:'Álgebra',geometria:'Geometría',prob_estadistica:'Prob/Est',fracciones:'Fracciones',porcentajes:'Porcentajes',potencias:'Potencias',factorizacion:'Factor.',calculo:'Cálculo',algebra_av:'Álg. Avanz.',funciones:'Funciones',geometria_3d:'Geom. 3D',prob_avanzada:'Prob. Avanz.'};

  respuestas.forEach(r=>{if(!r.eje)return;if(!ejes[r.eje])ejes[r.eje]={total:0,ok:0};ejes[r.eje].total++;if(r.correcta)ejes[r.eje].ok++});

  if(Object.keys(ejes).length>0){
    let html='';
    Object.keys(ejes).sort().forEach(eje=>{
      const e=ejes[eje],p=Math.round((e.ok/e.total)*100);
      html+=`<div class="eje-row"><div class="eje-name">${ejeN[eje]||eje}</div><div class="eje-bar"><div class="eje-bar-fill" style="width:${p}%;background:${ejeC[eje]||'var(--neon)'}"></div></div><div class="eje-pct" style="color:${ejeC[eje]||'var(--neon)'}">${p}%</div></div>`;
    });
    document.getElementById('eje-card').innerHTML=html;
  } else {
    document.getElementById('eje-card').innerHTML='<div class="empty">Completa sesiones para ver tu rendimiento por eje.</div>';
  }

  // Evolución semanal (últimas 8 semanas)
  if(sesiones.length>=3){
    const weeks={};
    sesiones.forEach(s=>{
      const d=new Date(s.created_at);
      const weekStart=new Date(d);weekStart.setDate(d.getDate()-d.getDay());
      const key=weekStart.toISOString().split('T')[0];
      if(!weeks[key])weeks[key]={sessions:0,pctSum:0,count:0};
      weeks[key].sessions++;
      if(s.pct_aciertos){weeks[key].pctSum+=Number(s.pct_aciertos);weeks[key].count++}
    });

    const sorted=Object.keys(weeks).sort().slice(-8);
    let html='';
    sorted.forEach(w=>{
      const wk=weeks[w];
      const avgPct=wk.count>0?Math.round(wk.pctSum/wk.count):0;
      const d=new Date(w);
      const label=`${d.getDate()}/${d.getMonth()+1}`;
      const color=avgPct>=70?'var(--neon)':avgPct>=50?'var(--yellow)':'var(--coral)';
      html+=`<div class="chart-bar"><div class="chart-bar-label">${label}</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:${avgPct}%;background:${color};color:var(--bg-deep)">${avgPct}%</div></div></div>`;
    });
    document.getElementById('evolution-card').innerHTML='<div class="card-title">Promedio aciertos por semana</div>'+html;
  } else {
    document.getElementById('evolution-card').innerHTML='<div class="empty">Necesitas al menos 3 sesiones para ver tu evolución.</div>';
  }

  // Logros
  const logrosDB=await sbGet('logros',`usuario_id=eq.${user.id}`);
  const unlocked=new Set(logrosDB.map(l=>l.tipo));

  // Auto-check y desbloquear nuevos logros
  const newLogros=[];
  if(sesiones.length>=1&&!unlocked.has('primera_sesion'))newLogros.push('primera_sesion');
  if(sesiones.length>=10&&!unlocked.has('sesiones_10'))newLogros.push('sesiones_10');
  if(sesiones.length>=50&&!unlocked.has('sesiones_50'))newLogros.push('sesiones_50');
  if(streak>=3&&!unlocked.has('racha_3'))newLogros.push('racha_3');
  if(streak>=7&&!unlocked.has('racha_7'))newLogros.push('racha_7');
  if(streak>=30&&!unlocked.has('racha_30'))newLogros.push('racha_30');
  if(sesiones.some(s=>Number(s.pct_aciertos)>=90)&&!unlocked.has('pct_90'))newLogros.push('pct_90');
  if(sesiones.some(s=>Number(s.tiempo_promedio_seg)>0&&Number(s.tiempo_promedio_seg)<15)&&!unlocked.has('velocidad'))newLogros.push('velocidad');

  for(const tipo of newLogros){
    const def=LOGROS_DEF.find(l=>l.tipo===tipo);
    await fetch(`${SUPABASE_URL}/rest/v1/logros`,{method:'POST',headers:{...SB_H,'Prefer':'return=representation'},body:JSON.stringify({usuario_id:user.id,tipo,descripcion:def?def.desc:''})});
    unlocked.add(tipo);
  }

  document.getElementById('logros-grid').innerHTML=LOGROS_DEF.map(l=>{
    const is=unlocked.has(l.tipo);
    return `<div class="logro ${is?'unlocked':'locked'}"><div class="logro-icon">${l.icon}</div><div class="logro-name">${l.name}</div>${is?'<div class="logro-date">Desbloqueado</div>':''}</div>`;
  }).join('');

  // Historial
  const modN={relampago:'⚡ Relámpago',simulacro_m1:'📐 M1',simulacro_m2:'📊 M2',estratega:'🧠 Estratega',lectora:'📖 Lectora'};
  if(sesiones.length>0){
    let html='';
    sesiones.slice(0,15).forEach(s=>{
      const f=new Date(s.created_at).toLocaleDateString('es-CL',{day:'numeric',month:'short'});
      const pct=s.pct_aciertos?Math.round(s.pct_aciertos)+'%':'—';
      const color=Number(s.pct_aciertos)>=70?'var(--neon)':Number(s.pct_aciertos)>=50?'var(--yellow)':'var(--coral)';
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:14px">${modN[s.modulo]||s.modulo}</div><div style="font-size:11px;color:var(--text-muted)">${f} · ${s.preguntas_total}p · ${Math.round(s.duracion_seg/60)}min</div></div><div style="font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:${color}">${pct}</div></div>`;
    });
    document.getElementById('history-card').innerHTML=html;
  } else {
    document.getElementById('history-card').innerHTML='<div class="empty">Aún no hay sesiones.</div>';
  }
}

if(!localStorage.getItem('paes_lab_user'))window.location.href='index.html';
loadProgress();
</script>
</body>
</html>
